name: ci_runtime

on: [push, pull_request]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            pkg-config \
            autotools-dev \
            libncurses5-dev \
            libparted-dev \
            libconfig-dev \
            libconfig++-dev \
            dmidecode \
            smartmontools \
            hdparm \
            util-linux

      - name: Create Autoconf files
        run: ./autogen.sh

      - name: Configure
        run: ./configure CFLAGS='-O0 -g -Wall -Wextra' CXXFLAGS='-O0 -g -Wall -Wextra'

      - name: Build
        run: make -j"$(nproc)"

      - name: Run deterministic unit tests
        run: |
          make -C src test_round_size
          ./src/test_round_size

      - name: Run CLI unit smoke test (executes nwipe --nogui)
        run: |
          chmod +x tests/ci/loopback_e2e.sh
          sudo -E env NWIPE_CI_ARTIFACT_DIR="$PWD/ci-artifacts/unit-cli" \
            tests/ci/loopback_e2e.sh smoke ./src/nwipe

      - name: Upload unit CLI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-cli-smoke-logs
          path: ci-artifacts/unit-cli
          if-no-files-found: ignore

  integration-loopback:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            pkg-config \
            autotools-dev \
            libncurses5-dev \
            libparted-dev \
            libconfig-dev \
            libconfig++-dev \
            dmidecode \
            smartmontools \
            hdparm \
            util-linux

      - name: Create Autoconf files
        run: ./autogen.sh

      - name: Configure
        run: ./configure CFLAGS='-O0 -g -Wall -Wextra' CXXFLAGS='-O0 -g -Wall -Wextra'

      - name: Build
        run: make -j"$(nproc)"

      - name: Build STS suite (legacy FFT mode)
        run: |
          git clone --depth 1 https://github.com/arcetri/sts.git /tmp/sts
          CCACHE_DIR=/tmp/ccache make -C /tmp/sts legacy

      - name: Run loopback integration tests
        run: |
          chmod +x tests/ci/loopback_e2e.sh
          sudo -E env \
            NWIPE_CI_ARTIFACT_DIR="$PWD/ci-artifacts/integration" \
            NWIPE_STS_BIN="/tmp/sts/sts_legacy_fft" \
            NWIPE_STS_MIN_RATIO="0.9" \
            NWIPE_STS_ITERATIONS="32" \
            NWIPE_STS_RETRIES="1" \
            tests/ci/loopback_e2e.sh full ./src/nwipe

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-loopback-logs
          path: ci-artifacts/integration
          if-no-files-found: ignore

  fault-injection:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            pkg-config \
            autotools-dev \
            libncurses5-dev \
            libparted-dev \
            libconfig-dev \
            libconfig++-dev \
            dmidecode \
            smartmontools \
            hdparm \
            util-linux \
            dmsetup

      - name: Create Autoconf files
        run: ./autogen.sh

      - name: Configure
        run: ./configure CFLAGS='-O0 -g -Wall -Wextra' CXXFLAGS='-O0 -g -Wall -Wextra'

      - name: Build
        run: make -j"$(nproc)"

      - name: Run fault injection tests
        run: |
          chmod +x tests/ci/fault_injection.sh
          sudo -E env NWIPE_CI_ARTIFACT_DIR="$PWD/ci-artifacts/fault-inj" \
            tests/ci/fault_injection.sh ./src/nwipe

      - name: Upload fault injection artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fault-injection-logs
          path: ci-artifacts/fault-inj
          if-no-files-found: ignore

  sanitizer-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            pkg-config \
            autotools-dev \
            libncurses5-dev \
            libparted-dev \
            libconfig-dev \
            libconfig++-dev \
            dmidecode \
            smartmontools \
            hdparm \
            util-linux

      - name: Create Autoconf files
        run: ./autogen.sh

      - name: Configure (ASan + UBSan)
        run: |
          ./configure \
            CFLAGS='-O1 -g -Wall -Wextra -fno-omit-frame-pointer -fsanitize=address,undefined' \
            CXXFLAGS='-O1 -g -Wall -Wextra -fno-omit-frame-pointer -fsanitize=address,undefined' \
            LDFLAGS='-fsanitize=address,undefined'

      - name: Build
        run: make -j"$(nproc)"

      - name: Run sanitizer smoke tests
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          chmod +x tests/ci/loopback_e2e.sh
          sudo -E env \
            ASAN_OPTIONS="$ASAN_OPTIONS" \
            UBSAN_OPTIONS="$UBSAN_OPTIONS" \
            NWIPE_CI_ARTIFACT_DIR="$PWD/ci-artifacts/sanitizer" \
            tests/ci/loopback_e2e.sh smoke ./src/nwipe

      - name: Upload sanitizer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-smoke-logs
          path: ci-artifacts/sanitizer
          if-no-files-found: ignore
